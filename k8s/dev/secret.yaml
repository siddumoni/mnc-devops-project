# ─────────────────────────────────────────────
# secret.yaml — DEV environment
#
# THIS FILE IS A PLACEHOLDER SKELETON ONLY.
# It defines the Secret resource structure so kubectl apply -f k8s/dev/
# works without errors.
#
# The ACTUAL secret value (DB_PASSWORD) is NEVER stored here.
# It is injected at deploy time by the Jenkinsfile using:
#
#   DB_PASSWORD=$(aws ssm get-parameter \
#     --name "/mnc-app/dev/db/password" --with-decryption ...)
#
#   kubectl create secret generic app-db-secret \
#     --from-literal=DB_PASSWORD="$DB_PASSWORD" \
#     --namespace=dev \
#     --dry-run=client -o yaml | kubectl apply -f -
#
# That command runs BEFORE this file is applied, so the real secret
# already exists by the time kubectl apply -f k8s/dev/ runs.
#
# DO NOT commit real passwords here.
# DO NOT remove this file — its absence causes the pipeline to fail.
# ─────────────────────────────────────────────
apiVersion: v1
kind: Secret
metadata:
  name: app-db-secret
  namespace: dev
  labels:
    app: mnc-app
    environment: dev
  annotations:
    # This skeleton is overwritten at deploy time by the Jenkins pipeline.
    # See jenkins/Jenkinsfile → deployToEnvironment() function.
    managed-by: "jenkins-pipeline"
type: Opaque
# data: block is intentionally empty here.
# The pipeline injects DB_PASSWORD via kubectl create secret --dry-run=client -o yaml | kubectl apply
# That apply overwrites this skeleton with the real (base64-encoded) value.
data: {}
