# ─────────────────────────────────────────────
# Kubernetes Secret — DB credentials
#
# IMPORTANT: Do NOT store real secrets in this file in Git.
# This is a TEMPLATE. In real MNC setups, secrets are injected
# by one of these approaches (in order of maturity):
#
#   1. External Secrets Operator + AWS Secrets Manager (best)
#   2. Sealed Secrets (good — encrypted blob in Git)
#   3. Jenkins injects via: kubectl create secret generic ...
#      as part of the pipeline (this lab uses this approach)
#
# The values below are base64-encoded placeholders.
# Real value is set by Jenkins from SSM Parameter Store.
# ─────────────────────────────────────────────
apiVersion: v1
kind: Secret
metadata:
  name: app-db-secret
  namespace: dev
  labels:
    app: mnc-app
    environment: dev
type: Opaque
data:
  # base64 encoded — Jenkins replaces this at deploy time via:
  # kubectl create secret generic app-db-secret \
  #   --from-literal=DB_PASSWORD=$(aws ssm get-parameter --name /mnc-app/dev/db/password --with-decryption --query Parameter.Value --output text) \
  #   --namespace=dev --dry-run=client -o yaml | kubectl apply -f -
  DB_PASSWORD: INJECT_AT_DEPLOY_TIME
