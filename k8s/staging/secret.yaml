# ─────────────────────────────────────────────
# Kubernetes Secret — staging DB credentials
#
# This is a TEMPLATE. The real password is injected by Jenkins at deploy time:
#
#   kubectl create secret generic app-db-secret \
#     --from-literal=DB_PASSWORD=$(aws ssm get-parameter \
#       --name /mnc-app/staging/db/password \
#       --with-decryption --query Parameter.Value --output text) \
#     --namespace=staging \
#     --dry-run=client -o yaml | kubectl apply -f -
#
# Never commit real passwords to Git.
# ─────────────────────────────────────────────
apiVersion: v1
kind: Secret
metadata:
  name: app-db-secret
  namespace: staging
  labels:
    app: mnc-app
    environment: staging
type: Opaque
data:
  DB_PASSWORD: INJECT_AT_DEPLOY_TIME
