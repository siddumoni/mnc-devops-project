# ─────────────────────────────────────────────
# Kubernetes Secret — prod DB credentials
#
# This is a TEMPLATE. Injected by Jenkins at deploy time via inject-secrets.sh.
# In a mature MNC setup this would be replaced by External Secrets Operator
# pulling directly from AWS Secrets Manager.
# ─────────────────────────────────────────────
apiVersion: v1
kind: Secret
metadata:
  name: app-db-secret
  namespace: prod
  labels:
    app: mnc-app
    environment: prod
type: Opaque
data:
  DB_PASSWORD: INJECT_AT_DEPLOY_TIME
