<svg width="680" height="420" viewBox="0 0 680 420" xmlns="http://www.w3.org/2000/svg" style="background:#ffffff;font-family:Arial,sans-serif;">

  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#888780" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="340" y="28" text-anchor="middle" font-size="15" font-weight="600" fill="#1a1a18">Terraform code structure — how files relate</text>

  <!-- Environment: dev -->
  <rect x="40" y="50" width="160" height="56" rx="8" fill="#E6F1FB" stroke="#185FA5" stroke-width="0.8"/>
  <text x="120" y="73" text-anchor="middle" font-size="13" font-weight="600" fill="#0C447C">environments/dev</text>
  <text x="120" y="94" text-anchor="middle" font-size="11" fill="#185FA5">main.tf + tfvars</text>

  <!-- Environment: staging -->
  <rect x="260" y="50" width="160" height="56" rx="8" fill="#E6F1FB" stroke="#185FA5" stroke-width="0.8"/>
  <text x="340" y="73" text-anchor="middle" font-size="13" font-weight="600" fill="#0C447C">environments/staging</text>
  <text x="340" y="94" text-anchor="middle" font-size="11" fill="#185FA5">main.tf + tfvars</text>

  <!-- Environment: prod -->
  <rect x="480" y="50" width="160" height="56" rx="8" fill="#E6F1FB" stroke="#185FA5" stroke-width="0.8"/>
  <text x="560" y="73" text-anchor="middle" font-size="13" font-weight="600" fill="#0C447C">environments/prod</text>
  <text x="560" y="94" text-anchor="middle" font-size="11" fill="#185FA5">main.tf + tfvars</text>

  <!-- Arrows: env → root module -->
  <line x1="120" y1="106" x2="200" y2="162" stroke="#888780" stroke-width="1.2" marker-end="url(#arrow)"/>
  <line x1="340" y1="106" x2="340" y2="162" stroke="#888780" stroke-width="1.2" marker-end="url(#arrow)"/>
  <line x1="560" y1="106" x2="480" y2="162" stroke="#888780" stroke-width="1.2" marker-end="url(#arrow)"/>

  <text x="340" y="156" text-anchor="middle" font-size="11" fill="#5F5E5A">all call the same root module</text>

  <!-- Root module -->
  <rect x="180" y="166" width="320" height="56" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.8"/>
  <text x="340" y="189" text-anchor="middle" font-size="13" font-weight="600" fill="#085041">infra/main.tf  (root module)</text>
  <text x="340" y="208" text-anchor="middle" font-size="11" fill="#0F6E56">Wires all sub-modules together, no backend block</text>

  <!-- Arrow: root → sub-modules fan -->
  <line x1="340" y1="222" x2="340" y2="256" stroke="#888780" stroke-width="1.2" marker-end="url(#arrow)"/>

  <!-- Sub-module: vpc -->
  <rect x="40" y="260" width="100" height="50" rx="8" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.8"/>
  <text x="90" y="281" text-anchor="middle" font-size="12" font-weight="600" fill="#3C3489">modules/</text>
  <text x="90" y="299" text-anchor="middle" font-size="11" fill="#534AB7">vpc</text>

  <!-- Sub-module: ec2-jenkins -->
  <rect x="158" y="260" width="100" height="50" rx="8" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.8"/>
  <text x="208" y="281" text-anchor="middle" font-size="12" font-weight="600" fill="#3C3489">modules/</text>
  <text x="208" y="299" text-anchor="middle" font-size="11" fill="#534AB7">ec2-jenkins</text>

  <!-- Sub-module: ecr -->
  <rect x="276" y="260" width="100" height="50" rx="8" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.8"/>
  <text x="326" y="281" text-anchor="middle" font-size="12" font-weight="600" fill="#3C3489">modules/</text>
  <text x="326" y="299" text-anchor="middle" font-size="11" fill="#534AB7">ecr</text>

  <!-- Sub-module: eks -->
  <rect x="394" y="260" width="100" height="50" rx="8" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.8"/>
  <text x="444" y="281" text-anchor="middle" font-size="12" font-weight="600" fill="#3C3489">modules/</text>
  <text x="444" y="299" text-anchor="middle" font-size="11" fill="#534AB7">eks</text>

  <!-- Sub-module: rds -->
  <rect x="512" y="260" width="100" height="50" rx="8" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.8"/>
  <text x="562" y="281" text-anchor="middle" font-size="12" font-weight="600" fill="#3C3489">modules/</text>
  <text x="562" y="299" text-anchor="middle" font-size="11" fill="#534AB7">rds</text>

  <!-- Arrows: root → each sub-module -->
  <line x1="270" y1="222" x2="90" y2="259" stroke="#888780" stroke-width="1" marker-end="url(#arrow)"/>
  <line x1="300" y1="222" x2="208" y2="259" stroke="#888780" stroke-width="1" marker-end="url(#arrow)"/>
  <line x1="340" y1="222" x2="326" y2="259" stroke="#888780" stroke-width="1" marker-end="url(#arrow)"/>
  <line x1="380" y1="222" x2="444" y2="259" stroke="#888780" stroke-width="1" marker-end="url(#arrow)"/>
  <line x1="410" y1="222" x2="562" y2="259" stroke="#888780" stroke-width="1" marker-end="url(#arrow)"/>

  <!-- State backend note -->
  <rect x="40" y="352" width="598" height="52" rx="8" fill="#FAEEDA" stroke="#BA7517" stroke-width="0.8"/>
  <text x="339" y="373" text-anchor="middle" font-size="13" font-weight="600" fill="#633806">S3 backend: mnc-app-terraform-state-204803374292</text>
  <text x="339" y="393" text-anchor="middle" font-size="11" fill="#854F0B">Each environment writes to its own .tfstate key — never shared</text>

</svg>
