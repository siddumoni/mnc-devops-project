# ─────────────────────────────────────────────
# application.properties — base config
# Environment-specific values are injected via
# Kubernetes ConfigMaps and Secrets at runtime.
# The pod reads DB_HOST, DB_NAME, DB_PASSWORD
# from environment variables (set in deployment YAML).
# ─────────────────────────────────────────────

# Application
spring.application.name=mnc-app-backend
server.port=8080

# Database — values come from K8s env vars, not hardcoded here
spring.datasource.url=jdbc:mysql://${DB_HOST}:3306/${DB_NAME}?useSSL=true&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Connection pool tuning (HikariCP is Spring Boot default)
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=validate       # Never use 'create' or 'create-drop' in production!
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# Actuator — exposes health endpoint for Kubernetes liveness/readiness probes
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=when-authorized
management.info.env.enabled=true

# App info (shows in /actuator/info)
info.app.name=${spring.application.name}
info.app.version=@project.version@
info.app.environment=${DEPLOY_ENV:unknown}
